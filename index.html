<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Femenino Santa Ponsa - Index</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Montserrat:wght@500;700;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter', sans-serif;
}

html, body{
    width:100%;
    overflow-x:hidden;
}

body{
    background:black;
    color:white;
}

/* HEADER */
header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:85px;
    background:#000;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 35px;
    z-index:1000;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

.header-left{
    display:flex;
    align-items:center;
    gap:15px;
}

.logo{
    height:45px;
}

.club-name{
    font-family:'Montserrat', sans-serif;
    font-size:28px;
    font-weight:900;
    text-transform:uppercase;
}

.nav-desktop{
    display:flex;
    gap:30px;
}

.nav-desktop a{
    color:white;
    text-decoration:none;
    font-size:13px;
    font-weight:700;
    text-transform:uppercase;
}

/* USER */
.user-area{
    display:flex;
    align-items:center;
}

.user-btn{
    background:white;
    color:black;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    font-size:12px;
    font-weight:800;
    cursor:pointer;
    text-transform:uppercase;
    white-space:nowrap;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    align-items:center;
    padding:0 8%;
    background:
    linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.8)),
    url("https://images.unsplash.com/photo-1574629810360-7efbbe195018");
    background-size:cover;
    background-position:center;
}

.hero h1{
    font-family:'Montserrat', sans-serif;
    font-size:70px;
    font-weight:900;
    text-transform:uppercase;
}

/* MATCHES */
.matches-section{
    background:#000;
    padding:100px 0;
}

.matches-scroll{
    display:flex;
    gap:25px;
    overflow-x:auto;
    padding:30px;
    scroll-snap-type:x mandatory;
}

.matches-scroll::-webkit-scrollbar{
    display:none;
}

/* MATCH CARD */
.match-card.big{
    min-width:340px;
    height:200px;
    background:rgba(17,17,17,0.75);
    backdrop-filter: blur(12px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:0;
    padding:25px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    position:relative;
    overflow:hidden;
    transition:0.3s;
}

.match-card.big:hover{
    transform:translateY(-8px);
}

.match-card.big::after{
    content:"";
    position:absolute;
    bottom:-1px;
    right:-1px;
    width:160px;
    height:160px;
    background: linear-gradient(
        135deg,
        transparent 48%,
        #000 50%
    );
    pointer-events:none;
}

.match-card.big h3{
    font-family:'Montserrat', sans-serif;
    font-size:20px;
    font-weight:900;
    text-transform:uppercase;
}

.match-card.big p{
    font-size:14px;
    color:#ccc;
}

.match-card.big .score{
    font-size:30px;
    font-weight:900;
}

/* MOBILE FIX */
@media(max-width:768px){

    header{
        height:auto;
        padding:12px 15px;
        flex-wrap:wrap;
        gap:10px;
    }

    .header-left{
        gap:10px;
    }

    .logo{
        height:32px;
    }

    .club-name{
        font-size:18px;
    }

    .nav-desktop{
        display:none;
    }

    .user-btn{
        padding:6px 12px;
        font-size:11px;
    }

    .hero{
        padding:0 20px;
    }

    .hero h1{
        font-size:42px;
        line-height:1.1;
    }

    .matches-section{
        padding:60px 0;
    }

    .matches-scroll{
        padding:15px;
        gap:15px;
    }

    .match-card.big{
        min-width:280px;
        height:180px;
        padding:20px;
    }

    .match-card.big h3{
        font-size:18px;
    }

    .match-card.big .score{
        font-size:26px;
    }

    .match-card.big::after{
        width:90px;
        height:90px;
    }
}

</style>
</head>

<body>

<header>

    <div class="header-left">
        <img src="Logoclub.png" class="logo">
        <div class="club-name">FEMENINO</div>
    </div>

    <nav class="nav-desktop">
        <a href="#">Noticias</a>
        <a href="equipos.html">Equipos</a>
        <a href="#">Tienda</a>
    </nav>

    <div class="user-area" id="userArea">
        <button class="user-btn" onclick="loginAction()">LOG IN</button>
    </div>

</header>

<section class="hero">
    <h1>FEMENINO<br>SANTA PONSA</h1>
</section>

<section class="matches-section">

<div class="matches-scroll">

    <div class="match-card big">
        <h3>SP vs Palma</h3>
        <p>Amistoso</p>
        <div class="score">3 - 1</div>
    </div>

    <div class="match-card big">
        <h3>SP vs Barça B</h3>
        <p>Liga</p>
        <div class="score">2 - 2</div>
    </div>

</div>

</section>

<script>

const user = localStorage.getItem("user");
const userArea = document.getElementById("userArea");

if(user){
    userArea.innerHTML = `
        <button class="user-btn" onclick="logout()">${user}</button>
    `;
}

function loginAction(){
    if(user){
        window.location.href = "home.html";
    } else {
        window.location.href = "login.html";
    }
}

function logout(){
    localStorage.removeItem("user");
    window.location.href = "login.html";
}

</script>

</body>
</html>

</body>
</html>
